# HermesAgent Faceplate speech sidecar — example config.
# Mount this file at /etc/faceplate-sidecar/config.yaml inside the container.
# Environment variables override the values below where applicable; see
# faceplate_sidecar/config.py.

auth:
  # Empty token disables auth. Production deployments should set this and
  # propagate to the Faceplate via FACEPLATE_API_KEY.
  bearer_token: "${FACEPLATE_API_KEY}"
  cors_origins:
    - "http://localhost:*"
    - "app://."

asr:
  default_model: "faster-whisper-small.en"
  models:
    - name: "faster-whisper-small.en"
      backend: "faster-whisper"
      compute_type: "int8"
      device: "cpu"
    # GPU-only entries (only loaded if CUDA is present at runtime).
    - name: "faster-whisper-large-v3-turbo"
      backend: "faster-whisper"
      compute_type: "float16"
      device: "cuda"

tts:
  default_model: "piper:en_US-amy-medium"
  models:
    - name: "piper:en_US-amy-medium"
      backend: "piper-onnx"
      voice_path: "/voices/en_US-amy-medium.onnx"
    - name: "piper:en_US-libritts_r-medium"
      backend: "piper-onnx"
      voice_path: "/voices/en_US-libritts_r-medium.onnx"

wake:
  enabled: false
  backend: "openwakeword"
  models:
    - "/wakewords/hey_hermes.onnx"
  threshold: 0.5

# NOTE: Paraphrase LLM lives OUTSIDE this container. Run it on the host
# with `make litert-up` (which calls `litert-lm serve --api openai`).
# The Faceplate's paraphrase pass talks to it directly at
# http://127.0.0.1:7860/v1 (configurable in Settings → Paraphrase).

healthcheck:
  port: 8080
  path: "/health"
