name: faceplate-sidecar-slim

services:
  sidecar:
    build:
      context: .
      dockerfile: Dockerfile.cpu-slim
    image: ghcr.io/nousresearch/hermes-faceplate-sidecar:cpu-slim
    container_name: faceplate-sidecar
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      FACEPLATE_API_KEY: "${FACEPLATE_API_KEY:-}"
      FACEPLATE_BUILD: "cpu-slim"
    volumes:
      - faceplate-models:/models
      - faceplate-voices:/voices
      - faceplate-wakewords:/wakewords
      - ./config.yaml:/etc/faceplate-sidecar/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  faceplate-models:
  faceplate-voices:
  faceplate-wakewords:
