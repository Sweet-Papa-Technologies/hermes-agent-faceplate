# SearXNG metasearch — free, no-API-key web search backend for hermes-agent.
#
#   - Bound to 127.0.0.1:9080 only (no LAN exposure).
#   - Reachable from the hermes Docker container as
#     http://host.docker.internal:9080.
#   - Settings + uwsgi config in ./settings.yml; tweakable on the host.
#   - Redis sidekick used by SearXNG for the rate limiter (one shared instance,
#     unnamed network — searxng resolves "redis" by docker-compose service name).
#
# Run via `make searxng-up` from the repo root.

services:
  redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: searxng-redis
    restart: unless-stopped
    networks:
      - searxng
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - searxng-redis:/data

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - searxng
    ports:
      - "127.0.0.1:9080:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:9080/
      - SEARXNG_REDIS_URL=redis://redis:6379/0

networks:
  searxng:
    name: searxng

volumes:
  searxng-redis:
