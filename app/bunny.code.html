<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft cream body gradient -->
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="40%">
      <stop offset="0%" style="stop-color:#FFF9F0" />
      <stop offset="70%" style="stop-color:#F7EFE2" />
      <stop offset="100%" style="stop-color:#E8DCC8" />
    </radialGradient>
    <!-- Soft blush gradient -->
    <radialGradient id="blushGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:0" />
    </radialGradient>
    <!-- Eye depth -->
    <radialGradient id="eyeGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#5D4037" />
      <stop offset="100%" style="stop-color:#3E2723" />
    </radialGradient>
  </defs>

  <!-- Left Ear (Up) -->
  <path d="M 120 120 Q 90 20 160 50 Q 180 80 180 150" fill="#F7EFE2" stroke="#E8DCC8" stroke-width="2" />
  <path d="M 130 110 Q 110 40 150 60 Q 165 85 165 140" fill="#FFEBEE" opacity="0.5" />

  <!-- Right Ear (Folded) -->
  <path d="M 280 100 Q 360 60 380 150 Q 350 180 300 140" fill="#F7EFE2" stroke="#E8DCC8" stroke-width="2" />
  <path d="M 295 110 Q 340 85 355 140 Q 330 155 305 130" fill="#FFEBEE" opacity="0.5" />

  <!-- Main Face/Body -->
  <circle cx="200" cy="220" r="150" fill="url(#bodyGrad)" stroke="#E8DCC8" stroke-width="1" />

  <!-- Blushes -->
  <circle cx="110" cy="260" r="40" fill="url(#blushGrad)" />
  <circle cx="290" cy="260" r="40" fill="url(#blushGrad)" />

  <!-- Eyes -->
  <g>
    <circle cx="140" cy="235" r="32" fill="url(#eyeGrad)" />
    <circle cx="130" cy="220" r="8" fill="#FFFFFF" /> <!-- Sparkle -->
    <circle cx="150" cy="245" r="4" fill="#FFFFFF" opacity="0.6" />
  </g>
  <g>
    <circle cx="260" cy="235" r="32" fill="url(#eyeGrad)" />
    <circle cx="250" cy="220" r="8" fill="#FFFFFF" /> <!-- Sparkle -->
    <circle cx="270" cy="245" r="4" fill="#FFFFFF" opacity="0.6" />
  </g>

  <!-- Nose & Mouth -->
  <path d="M 190 255 Q 200 250 210 255" fill="none" stroke="#D81B60" stroke-width="3" stroke-linecap="round" opacity="0.4" /> <!-- Nose -->
  <path d="M 180 275 Q 200 295 220 275" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round" /> <!-- Mouth -->
  <path d="M 200 255 L 200 275" fill="none" stroke="#5D4037" stroke-width="1.5" opacity="0.3" />

</svg>
