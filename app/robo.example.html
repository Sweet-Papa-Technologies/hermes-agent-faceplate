<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic gradient for the face plate -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0d5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4c8b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdae9b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Inner shadow/depth for the eye sockets -->
    <radialGradient id="eyeSocket" cx="50%" cy="50%" r="50%">
      <stop offset="70%" style="stop-color:#8b7d6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d5244;stop-opacity:1" />
    </radialGradient>
    
    <!-- Glow effect for the eyes -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#c9f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#46b5e5;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Main Head Body -->
  <rect x="50" y="70" width="300" height="280" rx="60" fill="url(#metalGrad)" stroke="#8b7d6b" stroke-width="2" />
  
  <!-- Antenna -->
  <line x1="200" y1="70" x2="215" y2="25" stroke="#8b7d6b" stroke-width="4" />
  <circle cx="215" cy="25" r="8" fill="#ff9d00">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Panel Lines -->
  <path d="M 110 70 L 110 110 L 50 110" fill="none" stroke="#8b7d6b" stroke-width="1" opacity="0.5" />
  <path d="M 290 70 L 290 110 L 350 110" fill="none" stroke="#8b7d6b" stroke-width="1" opacity="0.5" />
  
  <!-- Rivets -->
  <circle cx="65" cy="125" r="3" fill="#8b7d6b" opacity="0.4" />
  <circle cx="65" cy="225" r="3" fill="#8b7d6b" opacity="0.4" />
  <circle cx="335" cy="125" r="3" fill="#8b7d6b" opacity="0.4" />
  <circle cx="335" cy="225" r="3" fill="#8b7d6b" opacity="0.4" />

  <!-- Eyes -->
  <circle cx="140" cy="190" r="45" fill="url(#eyeSocket)" stroke="#5d5244" stroke-width="4" />
  <circle cx="140" cy="190" r="30" fill="url(#eyeGlow)" />
  <circle cx="140" cy="190" r="8" fill="#ffffff" />
  
  <circle cx="260" cy="190" r="45" fill="url(#eyeSocket)" stroke="#5d5244" stroke-width="4" />
  <circle cx="260" cy="190" r="30" fill="url(#eyeGlow)" />
  <circle cx="260" cy="190" r="8" fill="#ffffff" />

  <!-- Mouth -->
  <path d="M 140 280 Q 200 310 260 280" fill="none" stroke="#5d5244" stroke-width="12" stroke-linecap="round" />
  <!-- Mouth Grille Detail -->
  <path d="M 155 288 Q 200 305 245 288" fill="none" stroke="#8b7d6b" stroke-width="2" stroke-dasharray="2,4" />

</svg>
