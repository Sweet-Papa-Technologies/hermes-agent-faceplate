<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="ring-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g id="state-ring" filter="url(#ring-glow)">
    <circle class="state-ring-racer"
            cx="128" cy="128" r="116"
            fill="none" stroke="currentColor" stroke-width="5"
            stroke-linecap="round"
            pathLength="100" stroke-dasharray="18 82"
            stroke-dashoffset="0" />
    <circle cx="128" cy="128" r="116" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 6" />
    <circle cx="128" cy="128" r="122" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4" />
  </g>
</svg>
